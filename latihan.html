```html
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Toko Elektronik</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color:#f4f7fc;
        }

        .hero{
            background: linear-gradient(135deg,#0d6efd,#4f9cff);
            color:white;
            padding:60px 20px;
            text-align:center;
        }

        .hero h1{
            font-weight:bold;
        }

        .card{
            border:none;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        .hasil{
            font-size:20px;
            font-weight:bold;
            color:#198754;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <section class="hero">
        <h1>Selamat Datang di Toko Elektronik Papaw</h1>
        <p>Belanja Mudah dan Nyaman Dengan Pelayanan Terbaik</p>
    </section>

    <!-- Form -->
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">

                <div class="card p-4">
                    <h2 class="text-center mb-4">Form Transaksi</h2>

                    <div class="mb-3">
                        <label class="form-label">Nama Pelanggan</label>
                        <input type="text" class="form-control" id="pelanggan">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Nama Produk</label>
                        <input type="text" class="form-control" id="produk">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Harga Produk</label>
                        <input type="number" class="form-control" id="harga">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Jumlah Pembelian</label>
                        <input type="number" class="form-control" id="jumlah">
                    </div>

                    <div class="d-flex gap-2">
                        <button class="btn btn-success" onclick="hitungTotal()">
                            Hitung Total
                        </button>

                        <button class="btn btn-danger" onclick="resetForm()">
                            Batal
                        </button>
                    </div>

                    <hr>

                    <div id="hasil" class="hasil text-center">
                        Total Pembayaran: Rp 0
                    </div>

                </div>

            </div>
        </div>
    </div>

    <script>
        function hitungTotal(){

            let harga = document.getElementById("harga").value;
            let jumlah = document.getElementById("jumlah").value;

            let total = harga * jumlah;

            document.getElementById("hasil").innerHTML =
            "Total Pembayaran : Rp " +
            total.toLocaleString("id-ID");
        }

        function resetForm(){

            document.getElementById("pelanggan").value = "";
            document.getElementById("produk").value = "";
            document.getElementById("harga").value = "";
            document.getElementById("jumlah").value = "";

            document.getElementById("hasil").innerHTML =
            "Total Pembayaran : Rp 0";
        }
    </script>

</body>
</html>
```
